<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenGradient Model Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 40px 20px;
      color: #0f172a;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 24px;
      color: #0f172a;
    }

    .box {
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 15px;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      margin-bottom: 16px;
      font-size: 15px;
      background: #fff;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
      box-sizing: border-box;
    }

    .primary-btn {
      background: #06b6d4;
      color: white;
      margin-bottom: 14px;
    }

    .primary-btn:hover {
      background: #0891b2;
    }

    .hub-btn {
      background: #0f172a;
      color: white;
      margin-top: 12px;
    }

    .hub-btn:hover {
      background: #020617;
    }

    .result {
      margin-top: 6px;
      background: #ecfeff;
      border-radius: 10px;
      padding: 16px;
      white-space: pre-line;
      line-height: 1.6;
      min-height: 90px;
      box-sizing: border-box;
    }

    .helper {
      margin-top: 18px;
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>OpenGradient Model Finder</h1>

    <div class="box">
      <label for="task">Task</label>

      <select id="task">
        <option>Text generation</option>
        <option>Data analysis</option>
        <option>Real-time inference</option>
        <option>Forecasting</option>
      </select>

      <button class="primary-btn" onclick="findModel()">Find model</button>

      <div class="result" id="result">Select a task and click "Find model" to get recommendations.</div>

      <a href="https://opengradient.ai" target="_blank">
        <button class="hub-btn">Open Model Hub</button>
      </a>

      <div class="helper">
        This tool helps users turn a general task into a clearer model search direction.
      </div>
    </div>
  </div>

  <script>
    function findModel() {
      let task = document.getElementById("task").value;
      let result = "";

      if (task === "Text generation") {
        result = `
Model types:
- LLMs
- Instruction models

Search terms:
- text generation
- LLM
- prompts

Tip:
Focus on models that follow instructions well and generate clean text.
        `;
      }

      if (task === "Data analysis") {
        result = `
Model types:
- analytics models
- structured reasoning

Search terms:
- data analysis
- structured output

Tip:
Look for models that return structured or interpretable data.
        `;
      }

      if (task === "Real-time inference") {
        result = `
Model types:
- low-latency models
- optimized models

Search terms:
- real-time
- fast inference

Tip:
Prioritize speed and lightweight models.
        `;
      }

      if (task === "Forecasting") {
        result = `
Model types:
- time-series models
- prediction models

Search terms:
- forecasting
- prediction

Tip:
Focus on models designed for trend analysis.
        `;
      }

      document.getElementById("result").innerText = result;
    }
  </script>

</body>
</html>
