<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenGradient Model Finder</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 820px;
  margin: auto;
}

h1 {
  margin-bottom: 25px;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #06b6d4;
  color: white;
}

.primary:hover {
  background: #0891b2;
}

.dark {
  background: #111827;
  color: white;
  margin-top: 10px;
}

.result {
  margin-top: 15px;
  background: #ecfeff;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}

.badge {
  margin-top: 10px;
  padding: 10px;
  background: #dcfce7;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
<h1>OpenGradient Model Finder</h1>

<div class="box">

<label>Task</label>
<select id="task">
<option>Text generation</option>
<option>Data analysis</option>
<option>Real-time inference</option>
<option>Forecasting</option>
</select>

<label>Priority</label>
<select id="priority">
<option>Best quality</option>
<option>Fastest</option>
<option>Balanced</option>
</select>

<button class="primary" onclick="findModel()">Find model</button>

<div class="result" id="result">
Select options and click "Find model"
</div>

<div class="badge" id="badge"></div>

<a href="https://opengradient.ai" target="_blank">
<button class="dark">Open Model Hub</button>
</a>

</div>
</div>

<script>
function findModel() {
  let task = document.getElementById("task").value;
  let priority = document.getElementById("priority").value;

  let result = "";
  let rec = "";

  if (task === "Text generation") {
    result = "LLMs, Instruction models";
    rec = priority === "Best quality" ? "GPT-style models"
        : priority === "Fastest" ? "Small lightweight LLM"
        : "Balanced LLM";
  }

  if (task === "Data analysis") {
    result = "Analytics, structured reasoning";
    rec = priority === "Best quality" ? "Deep reasoning model"
        : priority === "Fastest" ? "Light analysis model"
        : "Balanced analytics model";
  }

  if (task === "Real-time inference") {
    result = "Low latency models";
    rec = priority === "Best quality" ? "Optimized inference model"
        : priority === "Fastest" ? "Edge model"
        : "Balanced inference model";
  }

  if (task === "Forecasting") {
    result = "Time-series models";
    rec = priority === "Best quality" ? "Advanced prediction model"
        : priority === "Fastest" ? "Light predictor"
        : "Balanced forecasting model";
  }

  document.getElementById("result").innerText =
  "Model types:\n" + result + "\n\nPriority: " + priority;

  document.getElementById("badge").innerText =
  "Recommended: " + rec;
}
</script>

</body>
</html>
