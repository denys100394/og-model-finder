<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenGradient AI Model Finder</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

h1 {
  margin-bottom: 20px;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
  margin-bottom: 15px;
  min-height: 100px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #06b6d4;
  color: white;
}

.result {
  margin-top: 15px;
  background: #ecfeff;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}

.dark {
  background: #111827;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>OpenGradient AI Model Finder</h1>

<div class="box">

<label>Describe your task</label>
<textarea id="input" placeholder="Example: I need a model for crypto price prediction"></textarea>

<button class="primary" onclick="analyze()">Find model</button>

<div class="result" id="result">
Enter your task and click "Find model"
</div>

<a href="https://opengradient.ai" target="_blank">
<button class="dark">Open Model Hub</button>
</a>

</div>
</div>

<script>
function analyze() {
  let input = document.getElementById("input").value.toLowerCase();
  let result = "";

  if (input.includes("text") || input.includes("write")) {
    result = `
Detected: Text generation

Recommended:
- LLM models
- Instruction models

Search:
text generation, prompts, LLM
    `;
  }

  else if (input.includes("data") || input.includes("analysis")) {
    result = `
Detected: Data analysis

Recommended:
- Analytics models
- Structured reasoning

Search:
data analysis, structured output
    `;
  }

  else if (input.includes("real") || input.includes("fast")) {
    result = `
Detected: Real-time inference

Recommended:
- Low latency models
- Optimized models

Search:
real-time inference, fast models
    `;
  }

  else if (input.includes("predict") || input.includes("forecast")) {
    result = `
Detected: Forecasting

Recommended:
- Time-series models
- Prediction models

Search:
forecasting, prediction
    `;
  }

  else {
    result = `
Could not clearly detect task.

Try using words like:
- text
- data
- prediction
- real-time
    `;
  }

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
